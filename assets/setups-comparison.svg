<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#f0fdf4"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3e8ff"/>
      <stop offset="100%" stop-color="#faf5ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" font-size="26" font-weight="800" fill="#0f172a">Three working AI setups, one decision</text>
  <text x="600" y="72" text-anchor="middle" font-size="15" fill="#475569">Demoed at EO AI Productivity Exchange #1 · 2026-05-11</text>

  <!-- ========== CARD 1 — CHRIS ========== -->
  <g transform="translate(40, 110)">
    <rect width="360" height="540" rx="18" fill="url(#g1)" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
    <!-- Header -->
    <circle cx="34" cy="36" r="14" fill="#2563eb"/>
    <text x="34" y="41" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">1</text>
    <text x="60" y="32" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="1.5">SETUP 01</text>
    <text x="60" y="48" font-size="17" font-weight="800" fill="#0f172a">Workspace-Native</text>
    <text x="34" y="78" font-size="13" font-weight="600" fill="#1e3a8a">Christoph Erler · EO Berlin</text>

    <!-- Stack visualization -->
    <g transform="translate(20, 100)">
      <rect width="320" height="28" rx="6" fill="#bfdbfe"/>
      <text x="160" y="19" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">Body · Telegram bot + 31 MCP + 7 crons</text>
      <rect width="320" height="28" rx="6" fill="#93c5fd" y="34"/>
      <text x="160" y="53" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">Working · Claude Code on AWS Frankfurt</text>
      <rect width="320" height="28" rx="6" fill="#60a5fa" y="68"/>
      <text x="160" y="87" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Short-term · 125 memory files · CLAUDE.md</text>
      <rect width="320" height="28" rx="6" fill="#3b82f6" y="102"/>
      <text x="160" y="121" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Long-term · GitHub + Notion + Drive</text>
    </g>

    <!-- Numbers -->
    <g transform="translate(20, 270)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="1">THE NUMBERS</text>
      <text x="0" y="26" font-size="32" font-weight="800" fill="#0f172a">~150</text>
      <text x="78" y="26" font-size="13" fill="#475569">EUR / month</text>
      <text x="0" y="52" font-size="32" font-weight="800" fill="#0f172a">~23h</text>
      <text x="78" y="52" font-size="13" fill="#475569">saved / week</text>
      <text x="0" y="78" font-size="32" font-weight="800" fill="#0f172a">~1.5</text>
      <text x="78" y="78" font-size="13" fill="#475569">FTE replaced (45-60×)</text>
    </g>

    <!-- Best for -->
    <g transform="translate(20, 380)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#1e3a8a" letter-spacing="1">PICK IF YOU…</text>
      <text x="0" y="22" font-size="13" fill="#0f172a">• Live in Google Workspace daily</text>
      <text x="0" y="42" font-size="13" fill="#0f172a">• Need mobile (Telegram bot)</text>
      <text x="0" y="62" font-size="13" fill="#0f172a">• Operate across multiple domains</text>
      <text x="0" y="82" font-size="13" fill="#0f172a">• OK paying ~150 EUR/mo for ergonomics</text>
    </g>

    <!-- CTA -->
    <g transform="translate(20, 488)">
      <rect width="320" height="36" rx="8" fill="#2563eb"/>
      <text x="160" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">FORK → setups/chris-claude-code.md</text>
    </g>
  </g>

  <!-- ========== CARD 2 — DOM ========== -->
  <g transform="translate(420, 110)">
    <rect width="360" height="540" rx="18" fill="url(#g2)" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
    <circle cx="34" cy="36" r="14" fill="#16a34a"/>
    <text x="34" y="41" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">2</text>
    <text x="60" y="32" font-size="11" font-weight="700" fill="#14532d" letter-spacing="1.5">SETUP 02</text>
    <text x="60" y="48" font-size="17" font-weight="800" fill="#0f172a">Local-First Rolodex</text>
    <text x="34" y="78" font-size="13" font-weight="600" fill="#14532d">Dominik Raute · CTO JustWatch</text>

    <!-- 5-tier visualization -->
    <g transform="translate(20, 100)">
      <rect width="320" height="22" rx="5" fill="#dcfce7" stroke="#86efac"/>
      <text x="160" y="16" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">Tier 1 · System Prompt (hot)</text>
      <rect width="320" height="22" rx="5" fill="#bbf7d0" stroke="#86efac" y="26"/>
      <text x="160" y="42" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">Tier 2 · Bootstrap</text>
      <rect width="320" height="22" rx="5" fill="#86efac" stroke="#4ade80" y="52"/>
      <text x="160" y="68" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">Tier 3 · On-Demand</text>
      <rect width="320" height="22" rx="5" fill="#4ade80" stroke="#22c55e" y="78"/>
      <text x="160" y="94" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Tier 4 · Search Index</text>
      <rect width="320" height="22" rx="5" fill="#22c55e" stroke="#16a34a" y="104"/>
      <text x="160" y="120" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">Tier 5 · Raw Archive (cold)</text>
    </g>

    <!-- Numbers -->
    <g transform="translate(20, 270)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#14532d" letter-spacing="1">THE NUMBERS</text>
      <text x="0" y="26" font-size="32" font-weight="800" fill="#0f172a">~$0</text>
      <text x="78" y="26" font-size="13" fill="#475569">/ month marginal</text>
      <text x="0" y="52" font-size="32" font-weight="800" fill="#0f172a">107</text>
      <text x="78" y="52" font-size="13" fill="#475569">person Rolodex</text>
      <text x="0" y="78" font-size="32" font-weight="800" fill="#0f172a">2-5s</text>
      <text x="78" y="78" font-size="13" fill="#475569">local query time</text>
    </g>

    <!-- Best for -->
    <g transform="translate(20, 380)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#14532d" letter-spacing="1">PICK IF YOU…</text>
      <text x="0" y="22" font-size="13" fill="#0f172a">• Handle data that cannot leave your Mac</text>
      <text x="0" y="42" font-size="13" fill="#0f172a">• Want full sovereignty + $0 marginal cost</text>
      <text x="0" y="62" font-size="13" fill="#0f172a">• Are technical enough to debug solo</text>
      <text x="0" y="82" font-size="13" fill="#0f172a">• Can invest 12 months building toward it</text>
    </g>

    <!-- CTA -->
    <g transform="translate(20, 488)">
      <rect width="320" height="36" rx="8" fill="#16a34a"/>
      <text x="160" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">READ → setups/dom-rolodex.md</text>
    </g>
  </g>

  <!-- ========== CARD 3 — FABIAN ========== -->
  <g transform="translate(800, 110)">
    <rect width="360" height="540" rx="18" fill="url(#g3)" stroke="#9333ea" stroke-width="2" filter="url(#shadow)"/>
    <circle cx="34" cy="36" r="14" fill="#9333ea"/>
    <text x="34" y="41" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">3</text>
    <text x="60" y="32" font-size="11" font-weight="700" fill="#581c87" letter-spacing="1.5">SETUP 03</text>
    <text x="60" y="48" font-size="17" font-weight="800" fill="#0f172a">PAI Life OS</text>
    <text x="34" y="78" font-size="13" font-weight="600" fill="#581c87">Fabian Gless runs Daniel Miessler's PAI</text>

    <!-- Layer visualization -->
    <g transform="translate(20, 100)">
      <rect width="320" height="36" rx="8" fill="#e9d5ff" stroke="#d8b4fe"/>
      <text x="160" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#581c87">DA · Digital Assistant</text>
      <text x="160" y="32" text-anchor="middle" font-size="9" fill="#581c87">your conversational interface</text>
      <rect width="320" height="36" rx="8" fill="#d8b4fe" stroke="#c084fc" y="44"/>
      <text x="160" y="66" text-anchor="middle" font-size="11" font-weight="700" fill="#581c87">Pulse · Life Dashboard</text>
      <text x="160" y="76" text-anchor="middle" font-size="9" fill="#581c87">localhost:31337</text>
      <rect width="320" height="44" rx="8" fill="#c084fc" stroke="#a855f7" y="88"/>
      <text x="160" y="112" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">PAI Core</text>
      <text x="160" y="124" text-anchor="middle" font-size="9" fill="#ffffff">45 skills · 171 workflows · 37 hooks · Telos</text>
    </g>

    <!-- Numbers -->
    <g transform="translate(20, 270)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#581c87" letter-spacing="1">THE NUMBERS</text>
      <text x="0" y="26" font-size="32" font-weight="800" fill="#0f172a">FREE</text>
      <text x="100" y="26" font-size="13" fill="#475569">+ your API spend</text>
      <text x="0" y="52" font-size="32" font-weight="800" fill="#0f172a">45</text>
      <text x="55" y="52" font-size="13" fill="#475569">prebuilt skills</text>
      <text x="0" y="78" font-size="32" font-weight="800" fill="#0f172a">1-2d</text>
      <text x="78" y="78" font-size="13" fill="#475569">to value</text>
    </g>

    <!-- Best for -->
    <g transform="translate(20, 380)">
      <text x="0" y="0" font-size="11" font-weight="700" fill="#581c87" letter-spacing="1">PICK IF YOU…</text>
      <text x="0" y="22" font-size="13" fill="#0f172a">• Want a complete Life OS, not a starter</text>
      <text x="0" y="42" font-size="13" fill="#0f172a">• Are on macOS or Linux</text>
      <text x="0" y="62" font-size="13" fill="#0f172a">• Can buy into Telos / ISA / DA framing</text>
      <text x="0" y="82" font-size="13" fill="#0f172a">• Want a dashboard, not just a CLI</text>
    </g>

    <!-- CTA -->
    <g transform="translate(20, 488)">
      <rect width="320" height="36" rx="8" fill="#9333ea"/>
      <text x="160" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">INSTALL → setups/fabian-personal-ai.md</text>
    </g>
  </g>

  <!-- Footer note -->
  <text x="600" y="700" text-anchor="middle" font-size="12" fill="#64748b" font-style="italic">Same problem, three operator-level answers · Pick the one closest to how you already work</text>
</svg>
